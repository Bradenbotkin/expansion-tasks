<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigEp Expansion Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .task-card { transition: all 0.3s ease; }
        .expanded-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expanded .expanded-content { max-height: 1000px; padding-top: 1rem; }
        .expanded .chevron { transform: rotate(180deg); }
        [contenteditable]:focus { outline: 2px solid #6366f1; border-radius: 4px; padding: 0 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <div class="max-w-5xl mx-auto py-12 px-6">
        <header class="mb-10 flex justify-between items-end border-b pb-6 border-slate-200">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-indigo-900">SigEp Expansion Task Portal</h1>
                <p class="text-slate-500 mt-1 italic">Click any text to edit. Changes are saved automatically to your browser.</p>
            </div>
            <button onclick="addTask()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-bold transition shadow-lg active:scale-95">
                <i class="fas fa-plus mr-2"></i>New Task
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Tasks</p>
                <p id="totalCount" class="text-2xl font-black text-indigo-600">0</p>
            </div>
        </div>

        <div id="taskContainer" class="space-y-3">
            </div>
    </div>

    <script>
        // --- CORE FUNCTIONALITY ---

        // Load data on start
        window.onload = () => {
            const saved = localStorage.getItem('sigep_tasks');
            if (saved && saved.trim() !== "") {
                document.getElementById('taskContainer').innerHTML = saved;
                updateStats();
            } else {
                // Add a default task if empty
                addTask("Example: Market Research - Auburn", "High", "October 2026");
            }
        };

        // Save data to browser memory
        function save() {
            const content = document.getElementById('taskContainer').innerHTML;
            localStorage.setItem('sigep_tasks', content);
            updateStats();
        }

        function updateStats() {
            const count = document.querySelectorAll('.task-card').length;
            document.getElementById('totalCount').innerText = count;
        }

        function toggleTask(element) {
            element.closest('.task-card').classList.toggle('expanded');
        }

        function addTask(title = "New Expansion Task", priority = "Normal", date = "Set Date") {
            const container = document.getElementById('taskContainer');
            const div = document.createElement('div');
            div.className = "task-card bg-white border border-slate-200 rounded-xl shadow-sm hover:border-indigo-300 overflow-hidden";
            
            div.innerHTML = `
                <div class="p-4 cursor-pointer flex items-center justify-between" onclick="toggleTask(this)">
                    <div class="flex items-center space-x-4">
                        <div class="h-8 w-8 bg-indigo-50 text-indigo-600 rounded flex items-center justify-center">
                            <i class="fas fa-tasks text-sm"></i>
                        </div>
                        <div>
                            <h3 contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="font-bold text-slate-800">${title}</h3>
                            <div class="flex space-x-3 mt-1">
                                <span contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-[10px] font-bold uppercase tracking-widest text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded">${priority}</span>
                                <span contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-[10px] font-medium text-slate-400"><i class="far fa-calendar mr-1"></i>${date}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <i class="fas fa-chevron-down chevron text-slate-300 text-xs transition-transform"></i>
                    </div>
                </div>
                
                <div class="expanded-content px-12 pb-5 bg-slate-50/50 border-t border-slate-100">
                    <div class="py-4">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Detailed Notes & Owner</label>
                        <div contenteditable="true" onblur="save()" class="text-sm text-slate-600 leading-relaxed min-h-[60px]">
                            Add owner names, specific project goals, and next steps here...
                        </div>
                    </div>
                    <div class="flex justify-end border-t border-slate-200 pt-4">
                        <button onclick="this.closest('.task-card').remove(); save();" class="text-xs font-bold text-red-400 hover:text-red-600 transition">
                            <i class="fas fa-trash-alt mr-1"></i> DELETE TASK
                        </button>
                    </div>
                </div>
            `;
            
            container.prepend(div);
            save();
        }

        // Listen for all edits to save immediately
        document.addEventListener('input', (e) => {
            if (e.target.hasAttribute('contenteditable')) {
                save();
            }
        });
    </script>
</body>
</html>
