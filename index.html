<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expansion Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #09090b; 
            color: #e4e4e7; 
            background-image: radial-gradient(#27272a 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        .watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50vh; height: 50vh; opacity: 0.03; pointer-events: none; z-index: -1;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Sigma_Phi_Epsilon_Badge.svg/1024px-Sigma_Phi_Epsilon_Badge.svg.png');
            background-position: center; background-repeat: no-repeat; background-size: contain;
        }

        .glass-panel { background: rgba(24, 24, 27, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(63, 63, 70, 0.5); }
        
        .task-card { transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1); background-color: rgba(24, 24, 27, 0.9); border: 1px solid #27272a; }
        .task-card:hover { border-color: #ffffff; transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(255,255,255,0.1); z-index: 10; position: relative;}
        
        .expanded-content { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .expanded .expanded-content { max-height: 800px; padding-top: 1.5rem; padding-bottom: 1.5rem; border-top: 1px solid #3f3f46; }
        .expanded .chevron { transform: rotate(180deg); }
        
        [contenteditable]:focus { outline: none; background: #27272a; border-radius: 6px; padding: 2px 6px; box-shadow: 0 0 0 1.5px #ffffff; }
        
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1em; }
    </style>
</head>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
            <div class="glass-panel p-5 rounded-2xl">
                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Active Tasks</p>
                <p id="totalCount" class="text-4xl font-black text-white mt-2">0</p>
            </div>
            <div class="glass-panel p-5 rounded-2xl shadow-[inset_0_1px_0_rgba(6,182,212,0.2)]">
                <p class="text-[10px] font-bold text-cyan-500 uppercase tracking-widest">In Progress</p>
                <p id="inProgressCount" class="text-4xl font-black text-cyan-400 mt-2">0</p>
            </div>
            <div class="glass-panel p-5 rounded-2xl shadow-[inset_0_1px_0_rgba(16,185,129,0.2)]">

            </div>
            <div class="glass-panel p-5 rounded-2xl shadow-[inset_0_1px_0_rgba(244,63,94,0.2)]">

        </div>

        <div class="grid grid-cols-[160px,1fr,130px,130px,150px,140px,40px] gap-4 px-6 text-[13px] font-bold text-zinc-400 uppercase tracking-widest mb-4 items-center text-center">
            <div class="text-left">Status</div>
            <div class="text-left">Task Description</div>
            <div>Owner(s)</div>
            <div>Deadline</div>
            <div>Output/Chapter</div>
            <div>Time Added</div>
            <div></div>
        </div>

        <div id="taskContainer" class="space-y-3 min-h-[100px]">
            </div>

        <div class="mt-12 pt-8 border-t border-zinc-800/50 pb-20">
            <div class="flex items-center gap-3 cursor-pointer group w-max mb-6" onclick="toggleCompleted()">

                </div>

                    Completed Archive (<span id="completedDrawerCount">0</span>)
                </h2>
            </div>
            
            <div id="completedWrapper" class="hidden">

                    </div>
            </div>
        </div>

        window.onload = () => {
            // Note: Key updated to force a fresh load with all 80 tasks
            const activeSaved = localStorage.getItem('sigep_active_v6');
            const completedSaved = localStorage.getItem('sigep_completed_v6');
            
            let hasLoadedData = false;

            if (activeSaved && activeSaved.trim() !== "") {
                document.getElementById('taskContainer').innerHTML = activeSaved;
                hasLoadedData = true;
            }
            if (completedSaved && completedSaved.trim() !== "") {
                document.getElementById('completedContainer').innerHTML = completedSaved;
                hasLoadedData = true;
            }

            if (hasLoadedData) {
                document.querySelectorAll('.status-select').forEach(s => updateSelectColor(s, false));
            } else {
                initialTasks.forEach(t => renderTask(t[0], t[1], t[2], t[3], t[4]));
            }
            updateStats();
        };

        function toggleCompleted() {
            document.getElementById('completedWrapper').classList.toggle('hidden');
            document.getElementById('completedChevron').classList.toggle('rotate-90');
        }

        function updateSelectColor(selectElement, shouldSave = true) {
            const val = selectElement.value;
            selectElement.className = "status-select cursor-pointer text-[10px] font-black uppercase tracking-wider px-3 py-1.5 rounded-full border outline-none pr-6 transition-all " + STATUS_THEMES[val];
            
            const card = selectElement.closest('.task-card');
            const reviewerInput = card.querySelector('.reviewer-input');
            if(val === 'Needs Review') {
                reviewerInput.classList.remove('hidden');
            } else {
                reviewerInput.classList.add('hidden');
            }

            const taskContainer = document.getElementById('taskContainer');
            const completedContainer = document.getElementById('completedContainer');
            
            if (val === 'Completed') {
                if (card.parentElement !== completedContainer) {
                    completedContainer.appendChild(card);
                }
            } else {
                if (card.parentElement !== taskContainer) {
                    taskContainer.prepend(card); 
                }
            }
            
            if(shouldSave) save();
        }

        function save() {
            localStorage.setItem('sigep_active_v6', document.getElementById('taskContainer').innerHTML);
            localStorage.setItem('sigep_completed_v6', document.getElementById('completedContainer').innerHTML);
            updateStats();
        }

        function updateStats() {
            const allCards = document.querySelectorAll('.task-card');
            
            let inProg = 0, comp = 0, crit = 0, active = 0;
            const reviewList = document.getElementById('reviewList');
            reviewList.innerHTML = '';
            let reviewCount = 0;

            allCards.forEach(card => {
                const sel = card.querySelector('.status-select');
                if(!sel) return;
                
                if(sel.value !== 'Completed') active++;
                if(sel.value === 'In Progress') inProg++;
                if(sel.value === 'Completed') comp++;
                if(sel.value === 'Stuck' || sel.value === 'Behind') crit++;
                
                if(sel.value === 'Needs Review') {
                    reviewCount++;
                    const taskName = card.querySelector('.task-title').innerText;
                    const reviewer = card.querySelector('.reviewer-input').innerText || 'Unassigned';
                    
                    reviewList.innerHTML += `
                        <div class="bg-zinc-900/80 border border-amber-500/20 p-3 rounded-lg flex justify-between items-center cursor-pointer hover:border-amber-500/50 transition" onclick="alert('Scroll down to find this task.')">
                            <span class="text-xs font-semibold text-zinc-300 truncate max-w-[200px]">${taskName}</span>
                            <span class="text-[10px] font-black bg-amber-500/20 text-amber-400 px-2 py-1 rounded uppercase tracking-widest border border-amber-500/30">${reviewer}</span>
                        </div>
                    `;
                }
            });
            
            document.getElementById('totalCount').innerText = active; 
            document.getElementById('inProgressCount').innerText = inProg;
            document.getElementById('completedCount').innerText = comp;
            document.getElementById('completedDrawerCount').innerText = comp; 
            document.getElementById('criticalCount').innerText = crit;

            const reviewDash = document.getElementById('reviewDashboard');
            if(reviewCount > 0) {
                reviewDash.classList.remove('hidden');
            } else {
                reviewDash.classList.add('hidden');
            }
        }

        function toggleTask(element) {
            element.closest('.task-card').classList.toggle('expanded');
        }

        function renderTask(status, title, owner, deadline, output) {
            const now = new Date();
            const timeAdded = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ", " + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            
            const div = document.createElement('div');
            div.className = "task-card rounded-xl overflow-hidden";
            
            div.innerHTML = `
                <div class="grid grid-cols-[160px,1fr,130px,130px,150px,140px,40px] gap-4 p-4 items-center cursor-pointer task-row text-center" onclick="toggleTask(this)">
                    <div onclick="event.stopPropagation()" class="flex flex-col gap-1 text-left">
                        <select class="status-select cursor-pointer text-[10px] font-black uppercase tracking-wider px-3 py-1.5 rounded-full border outline-none pr-6 transition-all" onchange="updateSelectColor(this)">
                            <option value="Not Started" ${status==='Not Started'?'selected':''}>Not Started</option>
                            <option value="In Progress" ${status==='In Progress'?'selected':''}>In Progress</option>
                            <option value="Needs Review" ${status==='Needs Review'?'selected':''}>Needs Review</option>
                            <option value="Stuck" ${status==='Stuck'?'selected':''}>Stuck</option>
                            <option value="Behind" ${status==='Behind'?'selected':''}>Behind</option>
                            <option value="Completed" ${status==='Completed'?'selected':''}>Completed</option>
                        </select>
                        <div contenteditable="true" onblur="save()" class="reviewer-input ${status==='Needs Review'?'':'hidden'} text-[10px] font-bold text-amber-400 bg-amber-950/40 border border-amber-500/30 px-2 py-0.5 rounded ml-1 w-[120px] empty:before:content-['@Reviewer_Name'] empty:before:text-amber-700"></div>
                    </div>
                    <div class="text-left">
                        <h3 contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="task-title font-semibold text-sm text-zinc-100 placeholder-zinc-500">${title}</h3>
                    </div>
                    <div contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-xs font-medium text-zinc-400">${owner}</div>
                    <div contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-xs font-medium text-zinc-400">${deadline}</div>
                    <div contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-xs font-medium text-zinc-400">${output}</div>
                    <div class="text-[10px] font-mono text-zinc-500">${timeAdded}</div>
                    <div class="text-right">
                        <i class="fas fa-chevron-down chevron text-zinc-500 text-xs transition-transform"></i>
                    </div>
                </div>
                
                <div class="expanded-content px-6 bg-[#09090b]">
                    <div class="py-2 mb-4 text-left">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block mb-2">Detailed Notes & Execution Strategy</label>
                        <div contenteditable="true" onblur="save()" class="text-sm text-zinc-300 leading-relaxed min-h-[80px] bg-zinc-900/80 p-4 rounded-lg border border-zinc-800 focus:bg-zinc-800">
                            Double click to add detailed execution notes...
                        </div>
                    </div>
                    <div class="flex justify-end pt
