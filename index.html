<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SigEp Expansion | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #e4e4e7; }
        .glass-panel { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.5); }
        .task-card { transition: all 0.2s ease-in-out; background-color: #18181b; border: 1px solid #27272a; }
        .task-card:hover { border-color: #52525b; transform: translateY(-1px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .expanded-content { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .expanded .expanded-content { max-height: 800px; padding-top: 1.5rem; padding-bottom: 1.5rem; border-top: 1px solid #27272a; }
        .expanded .chevron { transform: rotate(180deg); }
        [contenteditable]:focus { outline: none; background: #27272a; border-radius: 6px; padding: 2px 6px; box-shadow: 0 0 0 1px #6366f1; }
        
        /* Custom Select Styling */
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1em; }
    </style>
</head>
<body class="min-h-screen selection:bg-indigo-500/30">

    <div class="max-w-[1600px] mx-auto py-8 px-6">
        
        <header class="mb-8 flex justify-between items-center pb-6 border-b border-zinc-800">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-3">
                    <i class="fas fa-bolt text-indigo-500"></i> Command Center
                </h1>
                <p class="text-zinc-500 mt-1 text-sm font-medium">Auburn Chapter Expansion | Live Sync Enabled</p>
            </div>
            <div class="flex items-center space-x-8 text-sm font-semibold text-zinc-400">
                <a href="YOUR_DASHBOARD_LINK" target="_blank" class="hover:text-indigo-400 transition-colors">Dashboard</a>
                <a href="YOUR_HIRING_LINK" target="_blank" class="hover:text-indigo-400 transition-colors">Hiring</a>
                <a href="YOUR_MODEL_LINK" target="_blank" class="hover:text-indigo-400 transition-colors">Model</a>
                <button onclick="addTask()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-lg font-bold transition-all shadow-[0_0_15px_rgba(79,70,229,0.4)] active:scale-95 flex items-center gap-2">
                    <i class="fas fa-plus text-xs"></i> New Task
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-panel p-5 rounded-2xl flex flex-col justify-between">
                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Total Tasks</p>
                <p id="totalCount" class="text-4xl font-black text-white mt-2">0</p>
            </div>
            <div class="glass-panel p-5 rounded-2xl flex flex-col justify-between shadow-[inset_0_1px_0_rgba(6,182,212,0.2)]">
                <p class="text-[10px] font-bold text-cyan-500 uppercase tracking-widest">In Progress</p>
                <p id="inProgressCount" class="text-4xl font-black text-cyan-400 mt-2">0</p>
            </div>
            <div class="glass-panel p-5 rounded-2xl flex flex-col justify-between shadow-[inset_0_1px_0_rgba(16,185,129,0.2)]">
                <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Completed</p>
                <p id="completedCount" class="text-4xl font-black text-emerald-400 mt-2">0</p>
            </div>
            <div class="glass-panel p-5 rounded-2xl flex flex-col justify-between shadow-[inset_0_1px_0_rgba(244,63,94,0.2)]">
                <p class="text-[10px] font-bold text-rose-500 uppercase tracking-widest">Critical / Stuck</p>
                <p id="criticalCount" class="text-4xl font-black text-rose-500 mt-2">0</p>
            </div>
        </div>

        <div class="grid grid-cols-[150px,1fr,120px,120px,130px,140px,40px] gap-4 px-6 text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">
            <div>Status</div>
            <div>Task Description</div>
            <div>Owner(s)</div>
            <div>Deadline</div>
            <div>Output</div>
            <div>Time Added</div>
            <div></div>
        </div>

        <div id="taskContainer" class="space-y-3">
            </div>
    </div>

    <script>
        // --- NEON APPLE-STYLE THEMES ---
        const STATUS_THEMES = {
            'Not Started': 'bg-zinc-800 text-zinc-300 border-zinc-600',
            'In Progress': 'bg-cyan-950/50 text-cyan-400 border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.2)]',
            'Stuck': 'bg-orange-950/50 text-orange-400 border-orange-500/50 shadow-[0_0_10px_rgba(249,115,22,0.2)]',
            'Behind': 'bg-rose-950/50 text-rose-400 border-rose-500/50 shadow-[0_0_10px_rgba(244,63,94,0.2)]',
            'Completed': 'bg-emerald-950/50 text-emerald-400 border-emerald-500/50 shadow-[0_0_10px_rgba(16,185,129,0.2)]'
        };

        window.onload = () => {
            const saved = localStorage.getItem('sigep_v3_dark');
            if (saved && saved.trim() !== "") {
                document.getElementById('taskContainer').innerHTML = saved;
                // Re-bind selects after loading HTML
                document.querySelectorAll('.status-select').forEach(select => updateSelectColor(select));
            } else {
                addTask(); // Add one blank task to start
            }
            updateStats();
        };

        function updateSelectColor(selectElement) {
            const val = selectElement.value;
            // Remove old classes
            selectElement.className = "status-select cursor-pointer text-[11px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full border outline-none pr-8 transition-all " + STATUS_THEMES[val];
            save();
        }

        function save() {
            // In a real team environment, this pushes to the database.
            // For now, it saves locally so you don't lose work while designing.
            localStorage.setItem('sigep_v3_dark', document.getElementById('taskContainer').innerHTML);
            updateStats();
        }

        function updateStats() {
            const container = document.getElementById('taskContainer');
            document.getElementById('totalCount').innerText = container.children.length;
            
            let inProg = 0, comp = 0, crit = 0;
            document.querySelectorAll('.status-select').forEach(sel => {
                if(sel.value === 'In Progress') inProg++;
                if(sel.value === 'Completed') comp++;
                if(sel.value === 'Stuck' || sel.value === 'Behind') crit++;
            });
            
            document.getElementById('inProgressCount').innerText = inProg;
            document.getElementById('completedCount').innerText = comp;
            document.getElementById('criticalCount').innerText = crit;
        }

        function toggleTask(element) {
            element.closest('.task-card').classList.toggle('expanded');
        }

        function addTask() {
            const container = document.getElementById('taskContainer');
            const div = document.createElement('div');
            div.className = "task-card rounded-xl overflow-hidden";
            
            // Generate timestamp
            const now = new Date();
            const timeAdded = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ", " + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            
            div.innerHTML = `
                <div class="grid grid-cols-[150px,1fr,120px,120px,130px,140px,40px] gap-4 p-4 items-center cursor-pointer" onclick="toggleTask(this)">
                    <div onclick="event.stopPropagation()">
                        <select class="status-select cursor-pointer text-[11px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full border outline-none pr-8 transition-all bg-zinc-800 text-zinc-300 border-zinc-600" onchange="updateSelectColor(this)">
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Stuck">Stuck</option>
                            <option value="Behind">Behind</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div>
                        <h3 contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="font-semibold text-sm text-zinc-100 placeholder-zinc-500">New Objective</h3>
                    </div>
                    <div contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-xs font-medium text-zinc-400">Unassigned</div>
                    <div contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-xs font-medium text-zinc-400">TBD</div>
                    <div contenteditable="true" onblur="save()" onclick="event.stopPropagation()" class="text-xs font-medium text-zinc-400">Auburn</div>
                    <div class="text-[11px] font-mono text-zinc-600">${timeAdded}</div>
                    <div class="text-right">
                        <i class="fas fa-chevron-down chevron text-zinc-500 text-xs transition-transform"></i>
                    </div>
                </div>
                
                <div class="expanded-content px-6 bg-[#111113]">
                    <div class="py-2 mb-4">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block mb-2">Detailed Notes & Execution Strategy</label>
                        <div contenteditable="true" onblur="save()" class="text-sm text-zinc-300 leading-relaxed min-h-[80px] bg-zinc-900/50 p-4 rounded-lg border border-zinc-800">
                            Start typing notes here...
                        </div>
                    </div>
                    <div class="flex justify-end pt-3">
                        <button onclick="if(confirm('Delete this task?')){this.closest('.task-card').remove(); save();}" class="text-xs font-bold text-rose-500 hover:text-rose-400 transition-colors bg-rose-500/10 px-4 py-2 rounded-lg border border-rose-500/20">
                            <i class="fas fa-trash-alt mr-1.5"></i> Delete
                        </button>
                    </div>
                </div>
            `;
            
            container.prepend(div);
            // Manually trigger the select color setup
            updateSelectColor(div.querySelector('.status-select'));
            save();
        }

        // Auto-save on typing
        document.addEventListener('input', (e) => {
            if (e.target.hasAttribute('contenteditable')) save();
        });
    </script>
</body>
</html>
